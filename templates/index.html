<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Manage M3U8 playlists from your music library">
    <title>Playlist Manager</title>

    <!-- Material icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- PWA manifest -->
    <link rel="manifest" href="/static/manifest.json">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/buttons.css">
    <link rel="stylesheet" href="/static/css/inputs.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="/static/css/playlist.css">
    <link rel="stylesheet" href="/static/css/editor.css">
    <link rel="stylesheet" href="/static/css/browser.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>

<body>
    <div id="app">
        <!-- Playlists page -->
        <div id="page-playlists" class="page active">
            <div class="container">
                <div class="header">
                    <div class="header-left">
                        <h1><span class="material-icons">library_music</span> Playlists</h1>
                    </div>
                    <div class="header-right">
                        <div class="search-field">
                            <span class="material-icons">search</span>
                            <input type="text" id="search" placeholder="Search playlists...">
                        </div>
                        <button onclick="createPlaylist()">
                            <span class="material-icons">add</span> New Playlist
                        </button>
                    </div>
                </div>

                <!-- Dynamic playlist grid -->
                <div id="list" class="playlist-grid"></div>

                <!-- Pager for playlists -->
                <div id="pager" class="pager"></div>
            </div>
        </div>

        <!-- Editor page -->
        <div id="page-editor" class="page">
            <div class="container">
                <div id="editor-container"></div>
            </div>
        </div>

        <!-- Browser modal page -->
        <!-- <div id="browser-modal" class="page">
            <div class="container">
                <div id="browser-container"></div>
            </div>
        </div> -->
    </div>

    <!-- App scripts -->
    <script src="/static/app.js"></script>
    <script src="/static/spa-router.js"></script>
    <script src="/static/playlists.js"></script>
    <script src="/static/editor.js"></script>

    <!-- Browser scripts -->
    <script src="/static/browser/browser-modal.js"></script>
    <script src="/static/browser/browser-navigation.js"></script>
    <script src="/static/browser/browser-selection.js"></script>

    <script>
        // Register service worker
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/static/sw.js")
                .catch(err => console.log("ServiceWorker registration failed:", err));
        }

        // Initialize playlists page
        window.addEventListener("DOMContentLoaded", initIndex);
    </script>
</body>

</html>
